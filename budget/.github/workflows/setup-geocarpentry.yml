name: Setup Geo Carpentry Complete Site

on:
  workflow_dispatch:

jobs:
  setup-site:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Complete Geo Carpentry Site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          script: |
            WP_CLI="$HOME/wp-cli.phar"
            WP_PATH="$HOME/domains/geocarpentry.com/public_html"
            WP="php $WP_CLI --path=$WP_PATH --allow-root"
            THEMES="$WP_PATH/wp-content/themes"

            echo "=== Creating Geo Carpentry Child Theme ==="
            mkdir -p "$THEMES/geo-carpentry-child"

            # =========================================
            # style.css - Brand Colors + Typography
            # =========================================
            cat > "$THEMES/geo-carpentry-child/style.css" << 'CSSEOF'
/*
Theme Name: Geo Carpentry Child
Template: astra
Version: 1.0
*/

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Raleway:wght@300;400;500;600;700&display=swap');

:root {
  --navy: #0d2137;
  --orange: #c85a14;
  --white: #ffffff;
  --light-gray: #f5f6fa;
  --dark-gray: #1a1a2e;
  --text-gray: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Raleway', sans-serif;
  color: #1a1a2e;
  background: #fff;
}

h1, h2, h3, h4 {
  font-family: 'Playfair Display', serif;
  color: var(--navy);
}

/* ===== HEADER ===== */
.ast-header-break-point .main-header-bar,
.main-header-bar {
  background: var(--navy) !important;
  border-bottom: 3px solid var(--orange);
}

.ast-builder-grid-row-container {
  background: var(--navy) !important;
}

/* ===== BUTTONS ===== */
.ast-button, .wp-block-button__link, .wpcf7-submit,
a.ast-button, button, input[type=submit] {
  background: var(--orange) !important;
  color: var(--white) !important;
  border-radius: 4px !important;
  font-family: 'Raleway', sans-serif !important;
  font-weight: 700 !important;
  letter-spacing: 1px !important;
  text-transform: uppercase !important;
  border: none !important;
  transition: all 0.3s ease !important;
}

.ast-button:hover, .wp-block-button__link:hover {
  background: var(--navy) !important;
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 25px rgba(200,90,20,0.4) !important;
}

/* ===== HERO SECTION ===== */
.gc-hero {
  background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%);
  min-height: 90vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 20px;
}

.gc-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(200,90,20,0.1)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
  opacity: 0.5;
}

.gc-hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

.gc-hero-tag {
  display: inline-block;
  background: var(--orange);
  color: var(--white);
  padding: 6px 18px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
  animation: fadeInDown 0.8s ease forwards;
}

.gc-hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(42px, 6vw, 82px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 24px;
  animation: fadeInUp 0.8s ease 0.2s forwards;
  opacity: 0;
}

.gc-hero h1 span { color: var(--orange); }

.gc-hero p {
  font-size: 18px;
  color: rgba(255,255,255,0.85);
  max-width: 600px;
  line-height: 1.8;
  margin-bottom: 40px;
  font-weight: 300;
  animation: fadeInUp 0.8s ease 0.4s forwards;
  opacity: 0;
}

.gc-hero-btns {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  animation: fadeInUp 0.8s ease 0.6s forwards;
  opacity: 0;
}

.gc-btn-primary {
  background: var(--orange);
  color: var(--white);
  padding: 16px 36px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 15px;
  text-decoration: none;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.gc-btn-primary:hover {
  background: #a84810;
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(200,90,20,0.5);
  color: var(--white);
}

.gc-btn-secondary {
  background: transparent;
  color: var(--white);
  padding: 16px 36px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 15px;
  text-decoration: none;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 2px solid rgba(255,255,255,0.4);
  transition: all 0.3s ease;
}

.gc-btn-secondary:hover {
  border-color: var(--orange);
  color: var(--orange);
  transform: translateY(-3px);
}

/* ===== STATS BAR ===== */
.gc-stats {
  background: var(--orange);
  padding: 30px 20px;
}

.gc-stats-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  text-align: center;
}

.gc-stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
}

.gc-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ===== SERVICES SECTION ===== */
.gc-services {
  padding: 100px 20px;
  background: var(--light-gray);
}

.gc-section-header {
  text-align: center;
  max-width: 700px;
  margin: 0 auto 60px;
}

.gc-section-tag {
  display: inline-block;
  color: var(--orange);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
  position: relative;
}

.gc-section-tag::before,
.gc-section-tag::after {
  content: '';
  display: inline-block;
  width: 30px;
  height: 2px;
  background: var(--orange);
  vertical-align: middle;
  margin: 0 10px;
}

.gc-section-header h2 {
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 900;
  color: var(--navy);
  line-height: 1.2;
  margin-bottom: 16px;
}

.gc-section-header p {
  color: var(--text-gray);
  font-size: 17px;
  line-height: 1.8;
}

.gc-services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}

.gc-service-card {
  background: var(--white);
  border-radius: 12px;
  padding: 40px 32px;
  transition: all 0.3s ease;
  border-bottom: 4px solid transparent;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  position: relative;
  overflow: hidden;
}

.gc-service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--orange);
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.gc-service-card:hover::before { transform: scaleX(1); }

.gc-service-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 60px rgba(13,33,55,0.15);
}

.gc-service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--navy), #1a3a5c);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.gc-service-card h3 {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 12px;
}

.gc-service-card p {
  color: var(--text-gray);
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 20px;
}

.gc-service-link {
  color: var(--orange);
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: gap 0.2s ease;
}

.gc-service-link:hover { gap: 10px; color: var(--orange); }

/* ===== WHY US ===== */
.gc-why {
  padding: 100px 20px;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

.gc-why::before {
  content: '';
  position: absolute;
  right: -100px;
  top: -100px;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: rgba(200,90,20,0.08);
}

.gc-why-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.gc-why-content .gc-section-tag { color: var(--orange); }
.gc-why-content h2 { color: var(--white); }
.gc-why-content p { color: rgba(255,255,255,0.7); font-size: 17px; line-height: 1.8; margin-bottom: 32px; }

.gc-why-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }

.gc-why-list li {
  display: flex;
  align-items: center;
  gap: 14px;
  color: rgba(255,255,255,0.9);
  font-size: 16px;
  font-weight: 500;
}

.gc-why-list li::before {
  content: '✓';
  width: 28px;
  height: 28px;
  background: var(--orange);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 900;
  flex-shrink: 0;
}

.gc-why-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.gc-why-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  transition: all 0.3s ease;
}

.gc-why-card:hover {
  background: rgba(200,90,20,0.15);
  border-color: var(--orange);
}

.gc-why-card-num {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 900;
  color: var(--orange);
  line-height: 1;
}

.gc-why-card-label {
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 8px;
}

/* ===== SERVICE AREA ===== */
.gc-area {
  padding: 100px 20px;
  background: var(--white);
}

.gc-area-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.gc-cities-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-top: 40px;
}

.gc-city {
  background: var(--light-gray);
  border-radius: 8px;
  padding: 14px 16px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  border-left: 3px solid var(--orange);
  transition: all 0.2s ease;
}

.gc-city:hover {
  background: var(--navy);
  color: var(--white);
  transform: translateY(-2px);
}

/* ===== CTA SECTION ===== */
.gc-cta {
  padding: 80px 20px;
  background: linear-gradient(135deg, var(--orange) 0%, #a84810 100%);
  text-align: center;
}

.gc-cta h2 {
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 900;
  color: var(--white);
  margin-bottom: 16px;
}

.gc-cta p {
  color: rgba(255,255,255,0.9);
  font-size: 18px;
  margin-bottom: 40px;
}

.gc-cta-btns {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.gc-cta-phone {
  background: var(--white);
  color: var(--orange) !important;
  padding: 18px 40px;
  border-radius: 4px;
  font-weight: 900;
  font-size: 18px;
  text-decoration: none;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.gc-cta-phone:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  color: var(--navy) !important;
}

.gc-cta-whatsapp {
  background: #25D366;
  color: var(--white) !important;
  padding: 18px 40px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 16px;
  text-decoration: none;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.gc-cta-whatsapp:hover {
  background: #128C7E;
  transform: translateY(-3px);
  color: var(--white) !important;
}

/* ===== FOOTER ===== */
.gc-footer {
  background: var(--dark-gray);
  padding: 70px 20px 30px;
}

.gc-footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 50px;
  margin-bottom: 50px;
}

.gc-footer-brand h3 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--white);
  margin-bottom: 8px;
}

.gc-footer-brand span { color: var(--orange); }

.gc-footer-brand p {
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  line-height: 1.7;
  margin-top: 12px;
  margin-bottom: 20px;
}

.gc-footer-social {
  display: flex;
  gap: 10px;
}

.gc-social-btn {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 16px;
  transition: all 0.2s ease;
  color: rgba(255,255,255,0.7);
}

.gc-social-btn:hover {
  background: var(--orange);
  color: var(--white);
  transform: translateY(-3px);
}

.gc-footer-col h4 {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--orange);
  display: inline-block;
}

.gc-footer-col ul {
  list-style: none;
}

.gc-footer-col ul li {
  margin-bottom: 10px;
}

.gc-footer-col ul li a {
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 14px;
  transition: color 0.2s ease;
}

.gc-footer-col ul li a:hover { color: var(--orange); }

.gc-footer-contact li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  margin-bottom: 12px;
}

.gc-footer-contact a {
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  transition: color 0.2s ease;
}

.gc-footer-contact a:hover { color: var(--orange); }

.gc-footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  max-width: 1200px;
  margin: 0 auto;
}

.gc-footer-bottom p {
  color: rgba(255,255,255,0.3);
  font-size: 13px;
}

.gc-footer-bottom span { color: var(--orange); }

/* ===== ANIMATIONS ===== */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .gc-services-grid { grid-template-columns: 1fr; }
  .gc-why-inner { grid-template-columns: 1fr; gap: 40px; }
  .gc-why-cards { grid-template-columns: 1fr 1fr; }
  .gc-stats-inner { grid-template-columns: repeat(2, 1fr); }
  .gc-cities-grid { grid-template-columns: repeat(2, 1fr); }
  .gc-footer-inner { grid-template-columns: 1fr 1fr; }
  .gc-footer-bottom { flex-direction: column; text-align: center; }
}
CSSEOF

            # =========================================
            # functions.php
            # =========================================
            cat > "$THEMES/geo-carpentry-child/functions.php" << 'PHPEOF'
<?php
add_action('wp_enqueue_scripts', function() {
    wp_enqueue_style('parent-style', get_template_directory_uri() . '/style.css');
    wp_enqueue_style('child-style', get_stylesheet_uri(), ['parent-style']);
});

// Register widget areas
function gc_widgets_init() {
    register_sidebar(['name' => 'Footer Widget Area', 'id' => 'footer-1']);
}
add_action('widgets_init', 'gc_widgets_init');
PHPEOF

            # =========================================
            # Activate child theme
            # =========================================
            $WP theme activate geo-carpentry-child
            echo "✅ Child theme activated"

            # =========================================
            # Delete old pages
            # =========================================
            $WP post list --post_type=page --format=ids | xargs $WP post delete --force 2>/dev/null || true
            echo "✅ Old pages deleted"

