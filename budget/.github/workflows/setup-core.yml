name: Setup Core Pages - Geo Carpentry

on:
  workflow_dispatch:

jobs:
  setup-core:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Core Pages
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 65002
          script: |
            WP_CLI="$HOME/wp-cli.phar"
            WP_PATH="$HOME/domains/geocarpentry.com/public_html"
            WP="php $WP_CLI --path=$WP_PATH --allow-root"

            # Write home content to file
            cat > /tmp/wp_home.html << 'HTMLEOF'
            <div style="background:#1a1a1a;padding:12px;text-align:center;color:#fff;font-size:14px;">
            📞 <a href="tel:9203671272" style="color:#f0a500;">(920) 367-1272</a> &nbsp;|&nbsp;
            💬 <a href="https://wa.me/19209340351" style="color:#25D366;">WhatsApp</a> &nbsp;|&nbsp;
            📘 <a href="https://www.facebook.com/profile.php?id=61578160947198" style="color:#1877F2;">Facebook</a> &nbsp;|&nbsp;
