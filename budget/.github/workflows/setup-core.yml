            <h1>Northeast Wisconsin's Premier Carpentry and Construction Company</h1>
            <p>Geo Carpentry LLC delivers world-class carpentry and construction services across Northeast Wisconsin — from Green Bay to Appleton, Oshkosh, Sheboygan, Wausau, Manitowoc, Fond du Lac and beyond. Licensed, insured, and driven by excellence since 2014.</p>
            <div style="background:#f0a500;padding:20px;text-align:center;border-radius:8px;margin:20px 0;">
            <h3 style="color:#1a1a1a;margin:0 0 10px;">Ready to Start Your Project?</h3>
            <p style="margin:0;"><strong>Call <a href="tel:9203671272">(920) 367-1272</a> | <a href="https://wa.me/19209340351">WhatsApp Us</a> | <a href="mailto:admin@geocarpentry.com">admin@geocarpentry.com</a></strong></p>
            <p style="margin:5px 0 0;font-size:13px;">Free estimates — No obligation — We respond within 24 hours</p>
            </div>
            <h2>Our Services</h2>
            <ul>
            <li><a href="/services/custom-carpentry/">Custom Carpentry and Woodwork</a></li>
            <li><a href="/services/kitchen-remodeling/">Kitchen Remodeling</a></li>
            <li><a href="/services/bathroom-remodeling/">Bathroom Remodeling</a></li>
            <li><a href="/services/deck-building/">Deck Building and Outdoor Structures</a></li>
            <li><a href="/services/home-renovation/">Home Renovation</a></li>
            <li><a href="/services/general-construction/">General Construction</a></li>
            </ul>
            <h2>Why Northeast Wisconsin Chooses Geo Carpentry LLC</h2>
            <ul>
            <li>✅ 10+ years of proven experience</li>
            <li>✅ Licensed and fully insured in Wisconsin</li>
            <li>✅ Serving 100-mile radius across Northeast Wisconsin</li>
            <li>✅ Free estimates — no obligation</li>
            <li>✅ Bilingual team — English and Spanish</li>
            <li>✅ Quality materials, expert craftsmanship, on-time delivery</li>
            </ul>
            <h2>Our Service Area</h2>
            <p>We proudly serve: Green Bay, Appleton, Oshkosh, Sheboygan, Manitowoc, Fond du Lac, Wausau, Marinette, Oconto, Shawano, De Pere, Ashwaubenon, Howard, Suamico, Bellevue, Allouez, Pulaski and all communities within 100 miles of Green Bay, Wisconsin.</p>
            <h2>Follow Us</h2>
            <p>📘 <a href="https://www.facebook.com/profile.php?id=61578160947198">Facebook</a> &nbsp;|&nbsp; 📸 <a href="https://www.instagram.com/geocarpentryllc2026">Instagram @geocarpentryllc2026</a></p>
            <div style="background:#f0a500;padding:20px;text-align:center;border-radius:8px;margin:20px 0;">
            <h3 style="color:#1a1a1a;margin:0 0 10px;">Get Your Free Estimate Today</h3>
            <p style="margin:0;"><strong>Call <a href="tel:9203671272">(920) 367-1272</a> | <a href="https://wa.me/19209340351">WhatsApp Us</a></strong></p>
            </div>
            HTMLEOF

            # Write about content to file
            cat > /tmp/wp_about.html << 'HTMLEOF'
            <div style="background:#1a1a1a;padding:12px;text-align:center;color:#fff;font-size:14px;">
            📞 <a href="tel:9203671272" style="color:#f0a500;">(920) 367-1272</a> &nbsp;|&nbsp;
            💬 <a href="https://wa.me/19209340351" style="color:#25D366;">WhatsApp</a> &nbsp;|&nbsp;
            📘 <a href="https://www.facebook.com/profile.php?id=61578160947198" style="color:#1877F2;">Facebook</a> &nbsp;|&nbsp;
            📸 <a href="https://www.instagram.com/geocarpentryllc2026" style="color:#E1306C;">Instagram</a>
            </div>
